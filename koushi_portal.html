<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講師ポータル — 株式会社LeVela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   Levela 講師ポータル — Design System
   ════════════════════════════════════════════════════════════ */
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --brand:#e51e2a; --brand-press:#c4151f; --brand-soft:#fdecec; --brand-tint:#fef5f5;
  --black:#000000; --sidebar:#0a0a0b; --pill:#16181d;
  --ink:#17181c; --ink2:#3f414a; --muted:#6b7280; --faint:#9aa1ad;
  --line:#ededee; --line2:#f4f5f6; --hair:#f0f1f2;
  --page:#fafafa; --card:#ffffff; --soft:#f6f7f8; --tint:#fafbfc;
  --ok:#16a34a; --ok-soft:#e7f6ec;
  --warn:#d98309; --warn-soft:#fdf1df;
  --danger:#e11d2a; --danger-soft:#fdecec;
  --info:#2563eb; --info-soft:#e8eefb;
  --r-card:16px; --r-box:12px; --r-input:10px; --r-btn:9px; --r-pill:999px;
  --sb-w:240px; --top-h:64px;
  --shadow-card:0 1px 2px rgba(17,18,28,.04);
  --shadow-pop:0 24px 60px rgba(17,18,28,.18);
  font-synthesis-weight:none;
}
html,body{ height:100%; }
body{
  font-family:"Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Segoe UI", sans-serif;
  background:var(--page); color:var(--ink); -webkit-font-smoothing:antialiased;
  font-size:14px; line-height:1.6; letter-spacing:.01em;
}
a{ color:inherit; text-decoration:none; }
::selection{ background:var(--brand-soft); }

.ic{ width:1em; height:1em; flex:none; stroke-width:1.9; vertical-align:-.14em; }
.ic-s{ width:.85em; height:.85em; }
.ic-l{ width:1.25em; height:1.25em; vertical-align:-.22em; }

/* App Shell */
.app{ display:grid; grid-template-columns:var(--sb-w) 1fr; grid-template-rows:var(--top-h) 1fr; min-height:100vh; }
.brandbox{ grid-column:1; grid-row:1; background:#fff; border-right:1px solid var(--line); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:10px; padding:0 18px; position:sticky; top:0; z-index:40; }
.brand-mark{ width:30px; height:30px; flex:none; display:flex; align-items:center; justify-content:center; }
.brand-name{ font-size:16px; font-weight:700; letter-spacing:.01em; color:var(--ink); white-space:nowrap; }
.brand-name b{ color:var(--brand); font-weight:700; }

.topbar{ grid-column:2; grid-row:1; background:#fff; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:16px; padding:0 28px; position:sticky; top:0; z-index:40; }
.searchbar{ flex:1; max-width:560px; position:relative; }
.searchbar input{ width:100%; height:42px; border:1px solid var(--line); border-radius:var(--r-input);
  background:#fff; padding:0 14px 0 42px; font:inherit; font-size:14px; color:var(--ink); transition:.12s; }
.searchbar input::placeholder{ color:var(--faint); }
.searchbar input:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
.searchbar .ic{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--faint); width:18px; height:18px; }
.topbar-right{ margin-left:auto; display:flex; align-items:center; gap:14px; }
.top-filter{ height:38px; border:1px solid var(--line); border-radius:var(--r-input); background:#fff; padding:0 12px;
  font:inherit; font-size:13px; color:var(--ink); min-width:200px; }
.top-filter:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
.top-user{ display:flex; align-items:center; gap:8px; color:var(--ink2); font-size:13.5px; white-space:nowrap; }
.top-user .ic{ color:var(--muted); }
.hamburger{ display:none; }
.last-updated{ font-size:11px; color:var(--faint); }

.sidebar{ grid-column:1; grid-row:2; background:var(--sidebar); position:sticky; top:var(--top-h);
  height:calc(100vh - var(--top-h)); display:flex; flex-direction:column; padding:14px 12px; gap:3px; z-index:30; }
.side-section{ font-size:10.5px; font-weight:700; letter-spacing:.12em; color:#5a5d66; padding:14px 12px 6px; text-transform:uppercase; }
.nav{ display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:10px; color:#c8cad0;
  font-size:13.5px; font-weight:500; cursor:pointer; transition:background .12s, color .12s; border:none; background:none; width:100%; text-align:left; font-family:inherit; }
.nav .ic{ width:18px; height:18px; color:#8b8e98; flex:none; }
.nav:hover{ background:#17181c; color:#fff; }
.nav:hover .ic{ color:#fff; }
.nav.active{ background:var(--brand); color:#fff; font-weight:600; }
.nav.active .ic{ color:#fff; }
.nav .nav-badge{ margin-left:auto; font-size:11px; font-weight:700; background:#17181c; color:#fff; border-radius:var(--r-pill);
  min-width:20px; height:20px; padding:0 6px; display:inline-flex; align-items:center; justify-content:center; }
.nav.active .nav-badge{ background:rgba(255,255,255,.22); }
.nav .nav-badge.hot{ background:var(--brand); }
.nav.active .nav-badge.hot{ background:rgba(255,255,255,.28); }
.side-foot{ margin-top:auto; padding:14px 12px 4px; font-size:11px; color:#54565e; border-top:1px solid #1c1d22; }

.content-wrap{ grid-column:2; grid-row:2; min-width:0; }
.content{ max-width:1320px; margin:0 auto; padding:28px 28px 64px; }
.page{ display:none; }
.page.active{ display:block; }

.page-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px; }
.page-title{ font-size:26px; font-weight:700; letter-spacing:.005em; line-height:1.25; }
.page-sub{ font-size:13.5px; color:var(--muted); margin-top:5px; }
.page-actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

/* Buttons */
.btn{ font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer; border-radius:var(--r-btn);
  padding:0 16px; height:40px; display:inline-flex; align-items:center; justify-content:center; gap:7px;
  border:1px solid transparent; transition:.12s; white-space:nowrap; }
.btn .ic{ width:16px; height:16px; }
.btn-primary{ background:var(--brand); color:#fff; }
.btn-primary:hover{ background:var(--brand-press); }
.btn-primary:disabled{ background:#f3a6ab; cursor:default; }
.btn-ghost{ background:#fff; color:var(--ink); border-color:var(--line); }
.btn-ghost:hover{ background:var(--soft); }
.btn-dark{ background:var(--pill); color:#fff; }
.btn-dark:hover{ background:#000; }
.btn-sm{ height:32px; padding:0 12px; font-size:12.5px; border-radius:8px; }
.btn-xs{ height:28px; padding:0 11px; font-size:12px; border-radius:7px; }
.btn-icon{ width:40px; height:40px; padding:0; }
.btn-icon.btn-sm{ width:32px; height:32px; }
.btn:active{ transform:scale(.98); }

/* Cards */
.card{ background:var(--card); border:1px solid var(--line); border-radius:var(--r-card); box-shadow:var(--shadow-card); }
.card-pad{ padding:24px 26px; }
.card-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.card-title{ font-size:16px; font-weight:600; display:flex; align-items:center; gap:9px; }
.card-title .ic{ color:var(--muted); width:18px; height:18px; }
.card-meta{ font-size:12.5px; color:var(--faint); }
.stack{ display:flex; flex-direction:column; gap:18px; }
.grid{ display:grid; gap:16px; }
.g2{ grid-template-columns:repeat(2,1fr); } .g3{ grid-template-columns:repeat(3,1fr); } .g4{ grid-template-columns:repeat(4,1fr); }

/* KPI */
.kpi{ background:var(--card); border:1px solid var(--line); border-radius:var(--r-card); padding:20px 22px; cursor:pointer;
  transition:border-color .12s, box-shadow .12s, transform .12s; position:relative; }
.kpi:hover{ border-color:#d9dadd; box-shadow:0 6px 20px rgba(17,18,28,.07); transform:translateY(-2px); }
.kpi-top{ display:flex; align-items:center; gap:9px; margin-bottom:14px; }
.kpi-ico{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex:none; }
.kpi-ico .ic{ width:18px; height:18px; }
.kpi-label{ font-size:12.5px; font-weight:600; color:var(--muted); }
.kpi-val{ font-size:34px; font-weight:700; line-height:1; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
.kpi-val .u{ font-size:16px; font-weight:600; color:var(--faint); margin-left:3px; }
.kpi-sub{ font-size:12px; color:var(--muted); margin-top:9px; display:flex; align-items:center; gap:6px; }
.kpi-arrow{ position:absolute; top:20px; right:20px; color:var(--faint); width:16px; height:16px; opacity:0; transition:.12s; }
.kpi:hover .kpi-arrow{ opacity:1; transform:translateX(2px); }
.ic-brand{ background:var(--brand-soft); color:var(--brand); }
.ic-ok{ background:var(--ok-soft); color:var(--ok); }
.ic-warn{ background:var(--warn-soft); color:var(--warn); }
.ic-info{ background:var(--info-soft); color:var(--info); }
.ic-gray{ background:var(--soft); color:var(--muted); }

/* Badges / Pills */
.badge{ display:inline-flex; align-items:center; gap:5px; height:24px; padding:0 11px; border-radius:var(--r-pill);
  font-size:12px; font-weight:600; background:var(--pill); color:#fff; white-space:nowrap; }
.badge .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }
.badge-dark{ background:var(--pill); color:#fff; }
.badge-red{ background:var(--brand); color:#fff; }
.badge-line{ background:#fff; color:var(--ink2); border:1px solid var(--line); }
.badge-ok{ background:var(--ok-soft); color:var(--ok); }
.badge-warn{ background:var(--warn-soft); color:var(--warn); }
.badge-danger{ background:var(--danger-soft); color:var(--danger); }
.badge-info{ background:var(--info-soft); color:var(--info); }
.badge-grad{ background:#eef0f2; color:var(--ink2); }

.sdot{ width:8px; height:8px; border-radius:50%; flex:none; display:inline-block; }
.sdot-danger{ background:var(--danger); } .sdot-warn{ background:var(--warn); }
.sdot-ok{ background:var(--ok); } .sdot-info{ background:var(--info); } .sdot-gray{ background:var(--faint); }

/* Tables */
.tbl-wrap{ overflow-x:auto; }
table.tbl{ width:100%; border-collapse:collapse; }
.tbl th{ text-align:left; font-size:11.5px; font-weight:600; color:var(--muted); letter-spacing:.02em;
  padding:0 16px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
.tbl td{ padding:14px 16px; border-bottom:1px solid var(--line2); font-size:13.5px; color:var(--ink2); vertical-align:middle; }
.tbl tbody tr:last-child td{ border-bottom:none; }
.tbl tbody tr.clickable{ cursor:pointer; transition:background .1s; }
.tbl tbody tr.clickable:hover{ background:var(--tint); }
.tbl td.name{ font-weight:600; color:var(--ink); }
.tbl .row-num{ color:var(--faint); font-variant-numeric:tabular-nums; }
.tbl tr.flag td{ background:var(--brand-tint); }
.tbl tr.flag:hover td{ background:var(--brand-soft); }
.cell-actions{ display:flex; gap:6px; justify-content:flex-end; }
.muted{ color:var(--muted); } .faint{ color:var(--faint); } .num{ font-variant-numeric:tabular-nums; }
.nowrap{ white-space:nowrap; }

.bar{ height:7px; background:#eef0f2; border-radius:var(--r-pill); overflow:hidden; min-width:64px; }
.bar > i{ display:block; height:100%; border-radius:var(--r-pill); background:var(--brand); }
.bar.ok > i{ background:var(--ok); } .bar.warn > i{ background:var(--warn); } .bar.danger > i{ background:var(--danger); }
.bar-row{ display:flex; align-items:center; gap:10px; }
.bar-lbl{ font-size:12px; font-weight:600; color:var(--ink2); font-variant-numeric:tabular-nums; min-width:34px; text-align:right; }

/* Today / Schedule */
.today{ border:1px solid var(--line); border-radius:var(--r-card); background:#fff; overflow:hidden; }
.today-band{ display:flex; gap:0; align-items:stretch; }
.today-date{ background:var(--brand); color:#fff; padding:20px 24px; min-width:184px; display:flex; flex-direction:column; justify-content:center; }
.today-date .lbl{ font-size:11px; font-weight:700; letter-spacing:.14em; opacity:.85; }
.today-date .d{ font-size:26px; font-weight:700; letter-spacing:-.01em; margin-top:4px; line-height:1.1; }
.today-date .c{ font-size:12.5px; font-weight:600; opacity:.92; margin-top:6px; }
.today-list{ flex:1; display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:18px 22px; }
.lec-chip{ display:inline-flex; align-items:center; gap:9px; border:1px solid var(--line); border-radius:11px; padding:9px 13px; background:#fff; transition:.12s; cursor:pointer; }
.lec-chip:hover{ border-color:var(--brand); box-shadow:0 4px 14px rgba(229,30,42,.08); }
.lec-chip .t{ font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }
.lec-chip .n{ font-size:13px; font-weight:600; }
.lec-chip .ty{ font-size:11px; color:var(--muted); }
.today-empty{ padding:22px; color:var(--muted); font-size:13.5px; }

.up-list{ display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto; }
.up-item{ display:flex; align-items:center; gap:13px; padding:11px 13px; border:1px solid var(--line); border-radius:var(--r-box); cursor:pointer; transition:.1s; }
.up-item:hover{ background:var(--tint); border-color:#d9dadd; }
.up-item.today-row{ border-color:var(--brand); background:var(--brand-tint); }
.up-date{ min-width:54px; text-align:center; padding:6px 4px; border-radius:9px; background:var(--soft); }
.up-item.today-row .up-date{ background:var(--brand); color:#fff; }
.up-date .md{ font-size:13px; font-weight:700; line-height:1.05; font-variant-numeric:tabular-nums; }
.up-date .dy{ font-size:10px; font-weight:600; opacity:.8; }
.up-meta{ flex:1; min-width:0; }
.up-cls{ font-size:13.5px; font-weight:600; color:var(--ink); }
.up-no{ font-size:11.5px; color:var(--muted); margin-top:1px; }

/* Todo */
.todo-group{ margin-bottom:18px; }
.todo-group-head{ display:flex; align-items:center; gap:10px; margin-bottom:11px; }
.todo-group-head .t{ font-size:14.5px; font-weight:700; }
.todo-group-head .badge{ height:22px; }
.todo-item{ display:flex; align-items:center; gap:14px; padding:14px 18px; border:1px solid var(--line); border-radius:var(--r-box);
  background:#fff; cursor:pointer; transition:.12s; margin-bottom:8px; }
.todo-item:hover{ border-color:#d9dadd; box-shadow:0 4px 16px rgba(17,18,28,.06); }
.todo-item.urgent{ border-left:3px solid var(--danger); }
.todo-item.warn{ border-left:3px solid var(--warn); }
.todo-item.grad{ border-left:3px solid var(--ok); }
.todo-item.idle{ border-left:3px solid var(--faint); }
.todo-av{ width:40px; height:40px; border-radius:11px; background:var(--soft); display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; color:var(--ink2); flex:none; }
.todo-body{ flex:1; min-width:0; }
.todo-name{ font-size:14px; font-weight:600; color:var(--ink); }
.todo-desc{ font-size:12.5px; color:var(--muted); margin-top:2px; }
.todo-right{ display:flex; align-items:center; gap:14px; flex:none; }
.todo-metric{ text-align:right; }
.todo-metric .v{ font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; }
.todo-metric .v.danger{ color:var(--danger); } .todo-metric .v.warn{ color:var(--warn); }
.todo-metric .l{ font-size:10.5px; color:var(--faint); font-weight:600; }

/* Teacher cards */
.tcard{ border:1px solid var(--line); border-radius:var(--r-card); background:#fff; overflow:hidden; cursor:pointer; transition:.12s; }
.tcard:hover{ border-color:#d9dadd; box-shadow:0 8px 24px rgba(17,18,28,.08); transform:translateY(-2px); }
.tcard-head{ display:flex; align-items:center; gap:11px; padding:15px 18px; border-bottom:1px solid var(--line2); }
.tcard-av{ width:38px; height:38px; border-radius:11px; background:var(--pill); color:#fff; font-weight:700; font-size:15px;
  display:flex; align-items:center; justify-content:center; flex:none; }
.tcard-name{ font-size:14.5px; font-weight:700; line-height:1.2; }
.tcard-role{ font-size:11.5px; color:var(--muted); margin-top:1px; }
.tcard-flag{ margin-left:auto; }
.tcard-body{ padding:15px 18px; display:flex; flex-direction:column; gap:11px; }
.tstat{ display:flex; align-items:center; justify-content:space-between; }
.tstat .l{ font-size:12.5px; color:var(--muted); }
.tstat .v{ font-size:13.5px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; }

/* Progress acc */
.acc{ border:1px solid var(--line); border-radius:var(--r-box); background:#fff; margin-bottom:12px; overflow:hidden; }
.acc > summary{ list-style:none; cursor:pointer; padding:15px 20px; display:flex; align-items:center; gap:12px; user-select:none; }
.acc > summary::-webkit-details-marker{ display:none; }
.acc > summary .chev{ width:16px; height:16px; color:var(--faint); transition:transform .15s; flex:none; }
.acc[open] > summary .chev{ transform:rotate(90deg); }
.acc > summary .t{ font-size:14.5px; font-weight:700; }
.acc > summary .count{ margin-left:auto; font-size:12.5px; color:var(--muted); font-weight:600; }
.acc[open] > summary{ border-bottom:1px solid var(--line2); }
.acc-body{ padding:16px 20px; display:grid; gap:10px; }
.acc-marker{ width:4px; align-self:stretch; border-radius:var(--r-pill); flex:none; }

.sline{ display:flex; align-items:center; gap:14px; padding:13px 16px; border:1px solid var(--line); border-radius:var(--r-box); cursor:pointer; transition:.1s; flex-wrap:wrap; }
.sline:hover{ background:var(--tint); border-color:#d9dadd; }
.sline-name{ font-size:13.5px; font-weight:600; color:var(--ink); min-width:120px; }
.sline-meta{ font-size:11.5px; color:var(--muted); }
.steps{ display:flex; gap:3px; flex-wrap:wrap; }
.sq{ width:14px; height:14px; border-radius:3px; flex:none; }
.sq.sp-done{ background:var(--ok); } .sq.sp-todo{ background:#dcefe2; }
.sq.ap-done{ background:var(--warn); } .sq.ap-todo{ background:#f7ead2; }
.sq.pp-done{ background:var(--info); } .sq.pp-todo{ background:#dde6fb; }
.steps-label{ font-size:10px; font-weight:700; color:var(--faint); width:22px; text-align:right; flex:none; }
.steps-row{ display:flex; align-items:center; gap:8px; }

.legend{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; font-size:12.5px; color:var(--ink2); font-weight:500; }
.legend .li{ display:flex; align-items:center; gap:6px; }

/* Modal */
.overlay{ position:fixed; inset:0; background:rgba(15,18,28,.42); backdrop-filter:blur(2px); z-index:200;
  display:none; align-items:center; justify-content:center; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:#fff; border-radius:var(--r-card); width:100%; max-width:540px; box-shadow:var(--shadow-pop);
  max-height:90vh; display:flex; flex-direction:column; animation:pop .16s ease; }
.modal.wide{ max-width:860px; }
@keyframes pop{ from{ transform:scale(.97); opacity:0; } to{ transform:none; opacity:1; } }
.modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:24px 26px 16px; }
.modal-eyebrow{ font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--faint); text-transform:uppercase; margin-bottom:5px; }
.modal-title{ font-size:20px; font-weight:700; line-height:1.3; }
.modal-x{ width:34px; height:34px; border-radius:50%; border:none; background:var(--soft); color:var(--muted); cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex:none; transition:.12s; }
.modal-x:hover{ background:#ececec; color:var(--ink); }
.modal-body{ padding:4px 26px 26px; overflow-y:auto; }
.modal-foot{ display:flex; gap:10px; justify-content:flex-end; padding:16px 26px 22px; border-top:1px solid var(--line2); }

.field{ margin-bottom:16px; }
.field > label{ display:block; font-size:13px; font-weight:600; color:var(--ink2); margin-bottom:7px; }
.field input, .field select, .field textarea{ width:100%; border:1px solid var(--line); border-radius:var(--r-input);
  padding:10px 13px; font:inherit; font-size:14px; color:var(--ink); background:#fff; transition:.12s; }
.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
.field .hint{ font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.5; }

.dm-profile{ display:flex; gap:16px; align-items:center; padding:4px 0 18px; border-bottom:1px solid var(--line2); margin-bottom:18px; }
.dm-av{ width:54px; height:54px; border-radius:14px; background:var(--pill); color:#fff; font-weight:700; font-size:20px;
  display:flex; align-items:center; justify-content:center; flex:none; }
.dm-info{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px 20px; margin-bottom:18px; }
.dm-info .k{ font-size:11px; color:var(--faint); font-weight:600; }
.dm-info .v{ font-size:14px; font-weight:600; margin-top:2px; }
.dm-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.dm-stat{ border:1px solid var(--line); border-radius:var(--r-box); padding:14px 16px; text-align:center; }
.dm-stat .v{ font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
.dm-stat .l{ font-size:11px; color:var(--muted); font-weight:600; margin-top:3px; }

/* Class detail (12-class timeline) */
.lec-tl{ display:flex; flex-direction:column; gap:8px; }
.lec-tl-item{ display:flex; align-items:flex-start; gap:14px; padding:12px 14px; border:1px solid var(--line); border-radius:var(--r-box); background:#fff; transition:.12s; }
.lec-tl-item.done{ background:var(--ok-soft); border-color:#cfe6d6; }
.lec-tl-item.next{ background:var(--brand-tint); border-color:var(--brand); box-shadow:0 4px 14px rgba(229,30,42,.08); }
.lec-tl-item.future{ opacity:.85; }
.lec-tl-no{ width:44px; height:44px; border-radius:11px; background:var(--soft); color:var(--ink2); font-weight:700; font-size:14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; flex:none; line-height:1.05; }
.lec-tl-no .num{ font-size:18px; font-variant-numeric:tabular-nums; }
.lec-tl-no .lbl{ font-size:9px; font-weight:600; color:var(--faint); }
.lec-tl-item.done .lec-tl-no{ background:var(--ok); color:#fff; }
.lec-tl-item.done .lec-tl-no .lbl{ color:rgba(255,255,255,.85); }
.lec-tl-item.next .lec-tl-no{ background:var(--brand); color:#fff; }
.lec-tl-item.next .lec-tl-no .lbl{ color:rgba(255,255,255,.85); }
.lec-tl-body{ flex:1; min-width:0; }
.lec-tl-title{ font-size:14px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.lec-tl-goal{ font-size:12px; color:var(--muted); margin-top:3px; line-height:1.55; }
.lec-tl-date{ font-size:11.5px; color:var(--muted); font-weight:600; font-variant-numeric:tabular-nums; flex:none; }

/* Help */
.help-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.help-item{ display:flex; gap:13px; padding:15px 16px; border:1px solid var(--line); border-radius:var(--r-box); background:#fff; }
.help-ico{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex:none; }
.help-item .nm{ font-size:14px; font-weight:700; margin-bottom:3px; }
.help-item .ds{ font-size:12.5px; color:var(--muted); line-height:1.55; }
.help-item .ds b{ color:var(--ink); font-weight:700; }

.empty{ text-align:center; color:var(--faint); font-size:13.5px; padding:48px 0; }
.chips{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.fchip{ font-size:12.5px; font-weight:600; color:var(--ink2); border:1px solid var(--line); background:#fff; border-radius:var(--r-pill);
  padding:6px 14px; cursor:pointer; transition:.12s; display:inline-flex; align-items:center; gap:7px; }
.fchip:hover{ border-color:#d9dadd; background:var(--soft); }
.fchip.active{ background:var(--pill); color:#fff; border-color:var(--pill); }
.fchip .n{ font-variant-numeric:tabular-nums; opacity:.7; }
.fchip.active .n{ opacity:.85; }
.fchip.danger.active{ background:var(--brand); border-color:var(--brand); }
.select-min{ height:38px; border:1px solid var(--line); border-radius:var(--r-input); background:#fff; padding:0 12px; font:inherit; font-size:13px; color:var(--ink); }
.select-min:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }

@media (max-width:1080px){
  .g4{ grid-template-columns:repeat(2,1fr); }
  .dm-info{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:860px){
  :root{ --sb-w:0px; }
  .app{ grid-template-columns:1fr; grid-template-rows:var(--top-h) 1fr; }
  .brandbox{ display:none; }
  .topbar{ grid-column:1; padding:0 16px; }
  .sidebar{ position:fixed; left:0; top:0; height:100vh; width:268px; transform:translateX(-100%); transition:transform .2s;
    box-shadow:0 0 50px rgba(0,0,0,.3); padding-top:18px; }
  .sidebar.open{ transform:none; }
  .content-wrap{ grid-column:1; }
  .content{ padding:18px 16px 56px; }
  .hamburger{ display:inline-flex; }
  .g2,.g3{ grid-template-columns:1fr; }
  .today-band{ flex-direction:column; } .today-date{ min-width:0; }
  .dm-info,.dm-stats{ grid-template-columns:1fr 1fr; }
  .page-title{ font-size:22px; }
}
</style>

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const ini = n => (n||'').replace(/\s/g,'').slice(0,1);
const mdy = d => `${d.getMonth()+1}/${d.getDate()}`;
const WEEK = ['日','月','火','水','木','金','土'];
const dow = d => WEEK[d.getDay()];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

/* ── Status / Curriculum / CURRICULUM ── */
const STATUS = {
  inprog:  { label:'進行中',   badge:'badge-line',   dot:'sdot-gray'   },
  ok50:    { label:'50日達成', badge:'badge-ok',     dot:'sdot-ok'     },
  over80:  { label:'80日達成', badge:'badge-info',   dot:'sdot-info'   },
  stagnant:{ label:'停滞中',   badge:'badge-danger', dot:'sdot-danger' },
  stuck:   { label:'つまずき', badge:'badge-warn',   dot:'sdot-warn'   },
  grad:    { label:'卒業',     badge:'badge-grad',   dot:'sdot-gray'   },
  no_sp:   { label:'未開始',   badge:'badge-line',   dot:'sdot-gray'   },
};
const CURR = { new:'新', old:'旧', roster:'名簿' };
const LEC_TYPES = ['ライブ講義','ワーク','個別面談','フィードバック'];

// ⭐ 全12回カリキュラム（共通定義・後で差し替え可能）
const CURRICULUM = [
  { no:1,  title:'オリエンテーション',         type:'ライブ講義',     goal:'アカウント設計の基礎を理解し、目標を設定する' },
  { no:2,  title:'コンセプト設計（初回HR）',   type:'個別面談',       goal:'発信テーマ・ペルソナを言語化する' },
  { no:3,  title:'プロフィール最適化',         type:'ワーク',         goal:'プロフィール・ハイライト・固定投稿を整える' },

/* ── Date helpers ── */
function parseDate(s) {
  if (!s || !String(s).trim()) return null;
  const t = String(s).trim();
  const m = t.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}
function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.floor((b.getTime() - a.getTime()) / 86400000);
}
function addDays(d, n) {
  if (!d) return null;
  const r = new Date(d.getTime());
  r.setDate(r.getDate() + n);
  return r;
}
function fmt(d) { return d ? `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}` : '–'; }
function pct(n, d){ return d ? Math.round(n/d*100) : 0; }

/* ── String / class helpers ── */
function normName(s) {
  return String(s || '')
    .replace(/[\s　]+/g, '')
    .replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function classKey(c) {
  return String(c || '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/[\s　_\-‐‑–—−]/g, '')
    .toLowerCase();
}
function teacherNameFromClass(cls) {
  if (!cls) return '';
  return String(cls).trim().replace(/[0-9A-Za-zＡ-Ｚ０-９ぁ-んァ-ヶ一-龠]?組$/, '').trim();
}

/* ── Step columns ── */
const SP_STEPS = Array.from({length:10}, (_,i) => `【SP】Step${i+1}完了日`);
const AP_STEPS = Array.from({length:5},  (_,i) => `【AP】Step${i+1}完了日`);
const PP_STEPS = Array.from({length:10}, (_,i) => `【PP】Step${i+1}完了日`);
const ALL_STEPS = [...SP_STEPS, ...AP_STEPS, ...PP_STEPS];
const NEW_STEPS = Array.from({length:19}, (_,i) => `STEP${i+1}完了日`);

/* ── isGraduated / gradDateOf ── */
function isGraduated(r) {
  if (r.completed) return r.completed <= TODAY;
  if (r.grad && r.grad.status === '卒業生') {
    const d = parseDate(r.grad.gradDate);
    return !d || d <= TODAY;
  }
  return false;
}
function gradDateOf(r) {
  if (r.completed) return fmt(r.completed);
  if (r.grad && r.grad.gradDate) return r.grad.gradDate;
  return '';
}

/* ── Expected graduation date ── */
function expectedGradDate(r) {
  const ck = r.className ? classKey(r.className) : null;
  const l1 = ck ? lecture1Map.get(ck) : null;
  let base = null;
  if (l1) base = addDays(l1, 180);
  else if (r.grad && r.grad.firstHR) {
    const hr = parseDate(r.grad.firstHR);
    if (hr) base = addDays(hr, 180);
  }
  if (!base) return null;
  const l12 = ck ? lecture12Map.get(ck) : null;
  return (l12 && l12 > base) ? l12 : base;
}

/* ── Lecture maps ── */
function populateLectureMaps(c) {
  if (!c || !c.lectures) return;
  const k = classKey(c.tab);
  if (c.lectures[0] && c.lectures[0].date) {
    const d = parseDate(c.lectures[0].date);
    if (d) lecture1Map.set(k, d);
  }
  if (c.lectures[11] && c.lectures[11].date) {
    const d = parseDate(c.lectures[11].date);
    if (d) lecture12Map.set(k, d);
  }
  classLecturesMap.set(k, { tab: c.tab, lectures: c.lectures });
}
async function preloadTeacherLectures(tid) {
  if (!tid || !CFG.webAppUrl) return;
  const sheetId = classSheetMap.get(tid);
  if (!sheetId) return;
  try {
    let data = lectureCache.get(sheetId);
    if (!data) {
      const resp = await fetch(`${CFG.webAppUrl}?token=${encodeURIComponent(CFG.token)}&action=lectures&sheetId=${encodeURIComponent(sheetId)}`);
      data = await resp.json();
      lectureCache.set(sheetId, data);
    }
    if (data && data.classes) {
      data.classes.forEach(populateLectureMaps);
      go(state.page);
    }
  } catch (e) { console.warn('preloadTeacherLectures failed', e); }
}

/* ══════════════════ DATA LOAD ══════════════════ */
function processRow(row, headers, kind) {
  const get = col => {
    const i = headers.indexOf(col);
    return (i>=0 && row[i]!=null) ? String(row[i]).trim() : '';
  };
  const id = get('管理ID');
  const name = get('表示名');
  if (!name && !id) return null;
  const className = get('クラス名(講師名)');
  const course = get('コース');

  let spStart, completed, allStepDates, totalSteps, spDone, apDone, ppDone;
  if (kind === 'new') {
    spStart = parseDate(get('投稿プログラム開始日'));
    allStepDates = NEW_STEPS.map(col => parseDate(get(col)));
    completed = allStepDates[18];
    totalSteps = 19;
    spDone = apDone = ppDone = 0;
  } else {
    spStart = parseDate(get('【SP】受講開始日'));
    allStepDates = ALL_STEPS.map(col => parseDate(get(col)));
    completed = parseDate(get('【PP】Step10完了日'));
    totalSteps = 25;
    spDone = allStepDates.slice(0,10).filter(Boolean).length;
    apDone = allStepDates.slice(10,15).filter(Boolean).length;
    ppDone = allStepDates.slice(15,25).filter(Boolean).length;
  }
  const daysSinceStart = spStart ? daysBetween(spStart, TODAY) : null;
  const completionDays = (spStart && completed) ? daysBetween(spStart, completed) : null;

  let status;
  if (!spStart) status = 'no_sp';
  else if (completed) status = completionDays <= 50 ? 'ok' : completionDays <= 80 ? 'over' : 'over80';
  else status = daysSinceStart < 50 ? 'inprog' : daysSinceStart < 80 ? 'expired' : 'expired80';

  const stepDatesFiltered = allStepDates.filter(Boolean);
  const lastStepDate = stepDatesFiltered.length ? stepDatesFiltered.reduce((a,b) => b>a?b:a) : null;
  const daysSinceLastStep = lastStepDate ? daysBetween(lastStepDate, TODAY) : null;
  const isActive = ['inprog','expired','expired80'].includes(status);
  const isStuck = isActive && daysSinceLastStep != null && daysSinceLastStep >= 3;
  const isStagnant = isActive && daysSinceLastStep != null && daysSinceLastStep >= 15;

  const month = spStart ? `${spStart.getFullYear()}/${String(spStart.getMonth()+1).padStart(2,'0')}` : null;

  const pe = postDataMap.get(id) || {};
  return {
    id, name, kind, className, course,
    status, spStart, completed, daysSinceStart, completionDays,
    isStuck, isStagnant, lastStepDate, daysSinceLastStep, month,
    allStepDates, totalSteps, spDone, apDone, ppDone,
    firstPostDate: pe.firstPostDate || null,
    post10Date: pe.post10Date || null,
    post30Date: pe.post30Date || null,
  };
}
function rosterRow(id, name) {
  return {
    id, name, kind:'roster', className:'', course:'',
    status:'no_sp', spStart:null, completed:null,
    daysSinceStart:null, completionDays:null,
    isStuck:false, isStagnant:false, lastStepDate:null, daysSinceLastStep:null,
    month:null, allStepDates:[], totalSteps:0, spDone:0, apDone:0, ppDone:0,
    firstPostDate:null, post10Date:null, post30Date:null,
  };
}

async function loadData() {
  if (!CFG.webAppUrl || !CFG.token) {
    openSettings(); return;
  }
  $('#lastUpdated').textContent = '読み込み中…';
  try {
    const url = `${CFG.webAppUrl}?token=${encodeURIComponent(CFG.token)}`;
    console.log('[loadData] fetching:', url.slice(0, 80) + '...');
    console.log('[loadData] origin:', location.origin, 'protocol:', location.protocol);
    let resp;
    try {
      const t0 = Date.now();
      resp = await fetch(url);
      console.log('[loadData] response in ' + (Date.now()-t0) + 'ms / HTTP ' + resp.status);
    } catch (e) {
      console.error('[loadData] fetch error:', e.name, e.message, e);
      const msg = `窓口に接続できません: ${e.message}\n詳細は DevTools (F12) → Console / Network タブを確認してください`;
      throw new Error(msg);
    }
    if (!resp.ok) throw new Error(`窓口アクセス失敗 (HTTP ${resp.status})`);
    console.log('[loadData] response received, parsing JSON...');
    const data = await resp.json();
    if (data.error) throw new Error(data.error === 'forbidden' ? '合言葉が違います（設定を確認）' : (data.message || data.error));
    console.log('[loadData] parsed OK. rows:', (data.progressOld?.rows?.length||0) + (data.progressNew?.rows?.length||0));

    // 投稿数（管理ID 起点）
    postDataMap = new Map();
    if (data.posts && data.posts.header && data.posts.rows) {
      const P = data.posts;
      const pi = c => P.header.indexOf(c);
      const pId = pi('管理ID'), pFirst = pi('初回投稿日'),
            p10 = pi('10投稿目完了日'), p30 = pi('30投稿目完了日');
      P.rows.forEach(r => {
        const id = pId>=0 ? String(r[pId]||'').trim() : '';
        if (!id) return;
        postDataMap.set(id, {
          firstPostDate: parseDate(pFirst>=0 ? r[pFirst]:''),
          post10Date:    parseDate(p10>=0 ? r[p10]:''),
          post30Date:    parseDate(p30>=0 ? r[p30]:''),
        });
      });
    }

    // 旧+新 統合
    const byId = new Map();
    const score = r => (r.spStart?2:0) + (r.allStepDates.some(Boolean)?1:0);
    const ingest = (tab, kind) => {
      if (!tab || !tab.header) return;
      tab.rows.forEach(rArr => {
        const row = processRow(rArr, tab.header, kind);
        if (!row) return;
        const key = row.id || ('name:' + row.name);
        const cur = byId.get(key);
        if (!cur || score(row) > score(cur)) byId.set(key, row);
      });
    };
    ingest(data.progressOld, 'old');
    ingest(data.progressNew, 'new');
    allRows = [...byId.values()];

    // 生徒情報の meta
    const studentMeta = new Map();
    const studentMetaByName = new Map();
    const S = data.students;
    if (S && S.header) {
      const si = c => S.header.indexOf(c);
      const sId = si('管理ID'), sNm = si('表示名'), sTid = si('講師ID'),
            sCls = si('クラス名(講師名)'), sUrl = si('【提出フォーム】アカウントURL');
      S.rows.forEach(r => {
        const id   = sId>=0 ? String(r[sId]||'').trim() : '';
        const name = sNm>=0 ? String(r[sNm]||'').trim() : '';
        const meta = {
          teacherId: sTid>=0 ? String(r[sTid]||'').trim() : '',
          className: sCls>=0 ? String(r[sCls]||'').replace(/[\s　]+/g,'').trim() : '',
          accountUrl: sUrl>=0 ? String(r[sUrl]||'').trim() : '',
        };
        if (id) studentMeta.set(id, meta);
        const nk = normName(name);
        if (nk && !studentMetaByName.has(nk)) studentMetaByName.set(nk, meta);
      });
    }
    const metaOf = r => studentMeta.get(r.id) || studentMetaByName.get(normName(r.name)) || {};

    // 卒業・現況
    const gradMap = new Map();
    const G = data.grad;
    if (G && G.header) {
      const gi = c => G.header.indexOf(c);
      const gName = gi('生徒名'), gCls = gi('クラス名'), gStat = gi('卒業生or現役生'),
            gDate = gi('卒業日（予定日も含む）'), gHR = gi('初回HR日'), gElapsed = gi('初回HR日〜何ヶ月経過'),
            gLast = gi('最終投稿日'), gNoPost = gi('直近未投稿日数'),
            gFol = gi('今日のフォロワー'), gPosts = gi('合計投稿数'), gUrl = gi('アカウントURL');
      G.rows.forEach(r => {
        const key = normName(gName>=0 ? r[gName]:'');
        if (!key) return;
        gradMap.set(key, {
          status:    gStat>=0 ? String(r[gStat]||'').trim() : '',
          gradDate:  gDate>=0 ? String(r[gDate]||'').trim() : '',
          firstHR:   gHR>=0 ? String(r[gHR]||'').trim() : '',
          elapsed:   gElapsed>=0 ? String(r[gElapsed]||'').trim() : '',
          lastPost:  gLast>=0 ? String(r[gLast]||'').trim() : '',
          noPostDays:gNoPost>=0 ? String(r[gNoPost]||'').trim() : '',
          followers: gFol>=0 ? String(r[gFol]||'').trim() : '',
          totalPosts:gPosts>=0 ? String(r[gPosts]||'').trim() : '',
          accountUrl:gUrl>=0 ? String(r[gUrl]||'').trim() : '',
        });
      });
    }

    // 名簿（生徒情報のみ）追加
    if (S && S.header) {
      const si2 = c => S.header.indexOf(c);
      const sId2 = si2('管理ID'), sNm2 = si2('表示名');
      const exId = new Set(), exNm = new Set();
      allRows.forEach(r => { if (r.id) exId.add(r.id); if (r.name) exNm.add(normName(r.name)); });
      S.rows.forEach(r => {
        const id = sId2>=0 ? String(r[sId2]||'').trim() : '';
        const name = sNm2>=0 ? String(r[sNm2]||'').trim() : '';
        if (!name && !id) return;
        const nk = normName(name);
        if (id && exId.has(id)) return;
        if (nk && exNm.has(nk)) return;
        if (id) exId.add(id);
        if (nk) exNm.add(nk);
        allRows.push(rosterRow(id, name));
      });
    }

    // attach meta
    allRows.forEach((r, i) => {
      r._idx = i;
      const meta = metaOf(r);
      r.teacherId = meta.teacherId || '';
      if (meta.className) r.className = meta.className;
      r.grad = gradMap.get(normName(r.name)) || null;
      r.accountUrl = (meta.accountUrl || (r.grad && r.grad.accountUrl) || '').trim();
    });

    // 卒業済みは「超過」バケットから外す
    allRows.forEach(r => {
      if (isGraduated(r) && ['expired','expired80','over80'].includes(r.status)) {
        r.status = 'grad';
        r.isStagnant = false;
        r.isStuck = false;
      }
    });

    // 講師ID 確定（クラス名から所属講師を優先）
    const classKeyToTid = new Map();
    const stemToTid = new Map();
    allRows.forEach(r => {
      if (!r.teacherId || !r.className) return;
      const ck = classKey(r.className);
      const cEntry = classKeyToTid.get(ck) || {};
      cEntry[r.teacherId] = (cEntry[r.teacherId]||0)+1;
      classKeyToTid.set(ck, cEntry);
      const stem = teacherNameFromClass(r.className);
      if (stem) {
        const sEntry = stemToTid.get(stem) || {};
        sEntry[r.teacherId] = (sEntry[r.teacherId]||0)+1;
        stemToTid.set(stem, sEntry);
      }
    });
    const topOf = obj => {
      const sorted = Object.entries(obj).sort((a,b) => b[1]-a[1]);
      return sorted.length ? { tid:sorted[0][0], count:sorted[0][1], total:sorted.reduce((s,[,c]) => s+c, 0) } : null;
    };
    allRows.forEach(r => {
      if (!r.className) return;
      const ck = classKey(r.className);
      const cTop = classKeyToTid.has(ck) ? topOf(classKeyToTid.get(ck)) : null;
      let tid = null;
      if (cTop && cTop.total>=2 && cTop.count/cTop.total>0.5) tid = cTop.tid;
      if (!tid) {
        const stem = teacherNameFromClass(r.className);
        if (stem && stemToTid.has(stem)) {
          const sTop = topOf(stemToTid.get(stem));
          if (sTop && sTop.total>=2 && sTop.count/sTop.total>0.5) tid = sTop.tid;
        }
      }
      if (tid) r.teacherId = tid;
    });

    // teacherMeta
    teacherMeta = new Map();
    allRows.forEach(r => {
      if (!r.teacherId) return;
      const t = teacherMeta.get(r.teacherId) || { count:0, names:{} };
      t.count++;
      const nm = teacherNameFromClass(r.className);
      if (nm) t.names[nm] = (t.names[nm]||0)+1;
      teacherMeta.set(r.teacherId, t);
    });
    teacherMeta.forEach((t, tid) => {
      const top = Object.entries(t.names).sort((a,b) => b[1]-a[1])[0];
      t.label = top ? top[0] : `講師${tid}`;
    });

    // class canon
    const classVariants = new Map();
    allRows.forEach(r => {
      if (!r.className) return;
      const k = classKey(r.className);
      const e = classVariants.get(k) || {};
      e[r.className] = (e[r.className]||0)+1;
      classVariants.set(k, e);
    });
    const classCanon = new Map();
    classVariants.forEach((counts, k) => {
      classCanon.set(k, Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0]);
    });
    allRows.forEach(r => { if (r.className) r.className = classCanon.get(classKey(r.className)); });

    // classSheetMap
    classSheetMap = new Map();
    (data.classSheets || []).forEach(c => { if (c.teacherId && c.sheetId) classSheetMap.set(c.teacherId, c.sheetId); });

    populateTeacherFilter();
    $('#lastUpdated').textContent = `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;
    if (CURRENT_TEACHER) preloadTeacherLectures(CURRENT_TEACHER);
    refreshCounts();
    go(state.page);
  } catch (err) {
    $('#lastUpdated').textContent = '読み込みエラー';
    alert(`データ読み込みエラー:\n${err.message}`);
  }
}

/* ── Teacher filter ── */
function populateTeacherFilter() {
  const dl = $('#teacherList');
  if (!dl) return;
  teacherByLabel = new Map();
  teacherIdToLabel = new Map();
  const list = [...teacherMeta.entries()].sort((a,b) => a[1].label.localeCompare(b[1].label,'ja'));
  list.forEach(([tid,t]) => {
    let label = t.label;
    if (teacherByLabel.has(label.toLowerCase())) label = `${t.label} (${tid})`;
    teacherByLabel.set(label.toLowerCase(), tid);
    teacherIdToLabel.set(tid, label);
  });
  dl.innerHTML = [...teacherIdToLabel.values()].map(label => `<option value="${label}"></option>`).join('');
  const input = $('#teacherFilter');
  if (input) input.value = CURRENT_TEACHER ? (teacherIdToLabel.get(CURRENT_TEACHER) || '') : '';
}
function resolveTeacher(v) {
  if (!v) return '';
  const low = v.trim().toLowerCase();
  if (teacherByLabel.has(low)) return teacherByLabel.get(low);
  const hits = [...teacherByLabel].filter(([label]) => label.toLowerCase().includes(low));
  if (hits.length === 1) return hits[0][1];
  return null;
}
function onTeacherChange() {
  const input = $('#teacherFilter');
  const resolved = resolveTeacher(input.value);
  if (resolved === null) {
    input.value = CURRENT_TEACHER ? (teacherIdToLabel.get(CURRENT_TEACHER)||'') : '';
    return;
  }
  CURRENT_TEACHER = resolved;
  try { CURRENT_TEACHER ? localStorage.setItem('koushi_teacher', CURRENT_TEACHER) : localStorage.removeItem('koushi_teacher'); } catch(e){}
  if (input) input.value = CURRENT_TEACHER ? (teacherIdToLabel.get(CURRENT_TEACHER)||'') : '';
  refreshCounts();
  if (CURRENT_TEACHER) preloadTeacherLectures(CURRENT_TEACHER);
  go(state.page);
}
function selectTeacher(tid) {
  CURRENT_TEACHER = tid;
  try { localStorage.setItem('koushi_teacher', tid); } catch(e){}
  const input = $('#teacherFilter');
  if (input) input.value = teacherIdToLabel.get(tid) || '';
  refreshCounts();
  if (CURRENT_TEACHER) preloadTeacherLectures(CURRENT_TEACHER);
  go('dashboard');
}

/* ── viewStudents adapter ── */
function scopedRows() { return CURRENT_TEACHER ? allRows.filter(r => r.teacherId === CURRENT_TEACHER) : allRows; }
function viewStudents(rows) {
  const src = rows || scopedRows();
  return src.map(r => {
    let status;
    if (isGraduated(r)) status = 'grad';
    else if (r.isStagnant) status = 'stagnant';
    else if (r.isStuck) status = 'stuck';
    else if (!r.spStart || r.status === 'no_sp') status = 'no_sp';
    else if (r.status === 'ok' || r.status === 'over') status = 'ok50';
    else if (r.status === 'over80') status = 'over80';
    else status = 'inprog';

    let sp=0, ap=0, pp=0;
    if (r.kind === 'old') { sp = r.spDone||0; ap = r.apDone||0; pp = r.ppDone||0; }
    else if (r.kind === 'new') {
      const dates = r.allStepDates || [];
      sp = dates.slice(0,10).filter(Boolean).length;
      ap = dates.slice(10,15).filter(Boolean).length;
      pp = dates.slice(15,19).filter(Boolean).length;
    }

    const doneN = (r.allStepDates||[]).filter(Boolean).length;
    const totalSteps = r.totalSteps || 25;
    const prog = Math.round(doneN/totalSteps*100);

    let step = '—';
    const dates = r.allStepDates || [];
    if (dates.length) {
      let lastIdx = -1;
      for (let i = dates.length-1; i >= 0; i--) if (dates[i]) { lastIdx = i; break; }
      if (lastIdx >= 0) {
        if (r.kind === 'old') {
          if (lastIdx < 10) step = 'SP-'+(lastIdx+1);
          else if (lastIdx < 15) step = 'AP-'+(lastIdx-9);
          else step = 'PP-'+(lastIdx-14);
        } else if (r.kind === 'new') step = 'STEP'+(lastIdx+1);
      }
    }
    if (status === 'grad') step = '完了';

    let days = r.daysSinceStart != null ? r.daysSinceStart : 0;
    if (status === 'no_sp' && r.grad && r.grad.firstHR) {
      const hr = parseDate(r.grad.firstHR);
      if (hr) days = daysBetween(hr, TODAY) || 0;
    }

    const posts = (r.grad && r.grad.totalPosts && /^\d+$/.test(r.grad.totalPosts)) ? parseInt(r.grad.totalPosts, 10) : 0;
    const followers = (r.grad && r.grad.followers) ? parseInt(String(r.grad.followers).replace(/[^\d]/g,''), 10) : 0;
    const man10 = followers >= 10000;

    return {
      _idx: r._idx, id: r.id || 'r'+r._idx, name: r.name||'',
      cls: r.className||'',
      month: r.month||'',
      teacher: r.teacherId ? (teacherMeta.get(r.teacherId)?.label||'') : '',
      curr: r.kind||'old',
      grad: status === 'grad', days, step, prog, posts, man10, status,
      sp, ap, pp, __row: r,
    };
  });
}
function studentsFor(_teacher) { return viewStudents(); }
function teacherStats(teacher) {
  const tid = teacher && [...teacherIdToLabel.entries()].find(([,l]) => l===teacher)?.[0];
  const src = tid ? allRows.filter(r => r.teacherId === tid) : (teacher ? scopedRows() : allRows);
  const list = viewStudents(src);
  const grad = list.filter(s => s.grad).length;
  const active = list.filter(s => !s.grad && s.status !== 'no_sp').length;
  const need = list.filter(s => s.status==='stagnant'||s.status==='stuck').length;
  const ok50 = list.filter(s => ['ok50','over80','grad'].includes(s.status)).length;
  const classes = [...new Set(list.map(s => s.cls).filter(Boolean))];
  const total = list.length;
  return { total, grad, active, need, ok50, rate50:pct(ok50, total), classes };
}

/* ══════════════════ RENDERERS ══════════════════ */
function getTodayLecs() {
  // 今日の講義一覧：講師の取得済み classLecturesMap から
  if (!CURRENT_TEACHER) return [];
  const list = [];
  const myCls = [...new Set(scopedRows().map(r => r.className).filter(Boolean))];
  myCls.forEach(cls => {
    const cd = classLecturesMap.get(classKey(cls));
    if (!cd) return;
    (cd.lectures||[]).forEach((l, i) => {
      const d = parseDate(l.date);
      if (!d) return;
      if (daysBetween(TODAY, d) === 0) list.push({ cls, no:i+1, type:l.type||'', date:d });
    });
  });
  return list.sort((a,b) => a.cls.localeCompare(b.cls));
}
function getUpcomingLecs(limit) {
  const list = [];
  const allCls = [...new Set(scopedRows().map(r => r.className).filter(Boolean))];
  allCls.forEach(cls => {
    const cd = classLecturesMap.get(classKey(cls));
    if (!cd) return;
    (cd.lectures||[]).forEach((l, i) => {
      const d = parseDate(l.date);
      if (!d) return;
      const dd = daysBetween(TODAY, d);
      if (dd >= 0) list.push({ cls, no:i+1, type:l.type||'', date:d, d:dd });
    });
  });
  list.sort((a,b) => a.date - b.date);
  return limit ? list.slice(0, limit) : list;
}

            <option value="new" ${state.searchCurr==='new'?'selected':''}>新</option>
            <option value="old" ${state.searchCurr==='old'?'selected':''}>旧</option>

          </select>
          <span class="card-meta" style="margin-left:auto">${rows.length} 名</span>
        </div>
        <div class="chips">
          ${chips.map(c => { const n = c.k ? all.filter(s => s.status===c.k).length : all.length;
            return `<button class="fchip ${c.k==='stagnant'?'danger ':''}${state.searchStatus===c.k?'active':''}" onclick="state.searchStatus='${c.k}';renderSearch()">${c.label} <span class="n">${n}</span></button>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-pad" style="padding-bottom:6px"><div class="card-title" style="font-size:15px">検索結果</div></div>
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>名前</th><th>クラス</th><th>講師</th><th>カリキュラム</th><th>ステータス</th><th>進捗</th><th>開始から</th><th>最終ステップ</th></tr></thead>
          <tbody>
            ${rows.length ? rows.map(s => { const urgent=s.status==='stagnant';
              return `<tr class="clickable ${urgent?'flag':''}" onclick="openStudent('${s.id}')">
                <td class="name">${s.name}</td><td class="nowrap">${s.cls}</td><td class="muted nowrap">${s.teacher}</td>
                <td><span class="badge badge-line">${CURR[s.curr]||s.curr}</span></td>
                <td>${statusBadge(s.status)}</td>
                <td style="min-width:120px"><div class="bar-row"><div class="bar ${barClass(s.status)}"><i style="width:${s.prog}%"></i></div><span class="bar-lbl">${s.prog}%</span></div></td>
                <td class="num nowrap">${s.grad?'—':s.days+'日'}</td><td class="nowrap">${s.step}</td></tr>`;

}

/* ═════════════ CLASSES ═════════════ */
function renderClasses(){
  if (!allRows.length) { $('#page-classes').innerHTML = '<div class="empty">データ未読み込み</div>'; return; }
  const all = viewStudents();
  // 開始月リスト（YYYY/MM 形式）
  const months = [...new Set(all.map(s => s.month).filter(Boolean))].sort().reverse();
  // クラス一覧（重複排除）
  const allClasses = [...new Set(all.map(s => s.cls).filter(Boolean))];
  $('#page-classes').innerHTML = `
    <div class="page-head">
      <div><div class="page-title">クラス一覧</div><div class="page-sub">${scopeLabel()} ／ 開始月別の集計</div></div>
    </div>
    <div class="stack">
      ${months.map(m => {
        const cs = allClasses.filter(c => {
          const cl = all.filter(s => s.cls === c);
          // 最頻出 month で判定
          const ms = cl.map(s => s.month).filter(Boolean);
          if (!ms.length) return false;
          const counts = {};
          ms.forEach(x => counts[x] = (counts[x]||0)+1);
          const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
          return top === m;
        });
        if (!cs.length) return '';
        const mStudents = all.filter(s => cs.includes(s.cls));
        const ok = mStudents.filter(s => ['ok50','over80','grad'].includes(s.status)).length;
        const [y, mo] = m.split('/');
        return `<div>
          <div class="card-head" style="margin-bottom:12px">
            <div class="card-title"><svg class="ic"><use href="#i-calendar"/></svg> ${y}年${+mo}月 開始</div>
            <span class="card-meta">${cs.length}クラス ・ ${mStudents.length}名 ・ 平均達成 ${pct(ok,mStudents.length)}%</span>
          </div>
          <div class="grid g2">
            ${cs.sort().map(cls => {
              const cl = all.filter(s => s.cls === cls);
              const need = cl.filter(s => s.status==='stagnant'||s.status==='stuck').length;
              const cok = cl.filter(s => ['ok50','over80','grad'].includes(s.status)).length;
              const grad = cl.filter(s => s.grad).length;
              const teacherLabel = cl[0]?.teacher || '';
              const lecData = classLecturesMap.get(classKey(cls));
              const lecHeld = lecData ? lecData.lectures.filter(l => l.held).length : 0;
              return `<div class="card card-pad" style="cursor:pointer" onclick="openClass('${cls.replace(/'/g,"\\'")}')">
                <div class="card-head" style="margin-bottom:14px">
                  <div style="display:flex;align-items:center;gap:11px"><span class="tcard-av" style="background:var(--brand)">${lecHeld}</span>
                    <div><div class="tcard-name">${cls}</div><div class="tcard-role">${teacherLabel} ／ 第${lecHeld||'?'}回 / 全12回</div></div></div>
                  ${need ? `<span class="badge badge-danger">要対応 ${need}</span>` : `<span class="badge badge-line">順調</span>`}
                </div>
                <div class="grid g3" style="gap:10px">
                  <div class="dm-stat"><div class="v">${cl.length}</div><div class="l">生徒数</div></div>
                  <div class="dm-stat"><div class="v" style="color:var(--ok)">${cok}</div><div class="l">達成</div></div>
                  <div class="dm-stat"><div class="v">${grad}</div><div class="l">卒業</div></div>
                </div>
                <div class="bar-row" style="margin-top:14px"><span style="font-size:12px;color:var(--muted);min-width:60px">達成率</span>
                  <div class="bar ok"><i style="width:${pct(cok,cl.length)}%"></i></div><span class="bar-lbl">${pct(cok,cl.length)}%</span></div>
              </div>`;
            }).join('')}
          </div></div>`;
      }).join('')}
    </div>`;
}

/* ═════════════ PROGRESS ═════════════ */
function renderProgress(){
  if (!allRows.length) { $('#page-progress').innerHTML = '<div class="empty">データ未読み込み</div>'; return; }
  const list = viewStudents();
  const started = list.filter(s => s.status!=='no_sp');
  const ok50 = list.filter(s => ['ok50','over80','grad'].includes(s.status)).length;
  const ok80 = list.filter(s => ['over80','grad'].includes(s.status)).length;
  const post10 = started.filter(s => s.posts>=10).length;
  const post30 = started.filter(s => s.posts>=30).length;
  const kpis = [
    {ico:'i-award', cls:'ic-ok',   label:'50日達成（SP/AP/PP完了）', val:pct(ok50,list.length), unit:'%', sub:`${ok50} / ${list.length} 名`},
    {ico:'i-chart', cls:'ic-info', label:'80日達成', val:pct(ok80,list.length), unit:'%', sub:`${ok80} / ${list.length} 名`},
    {ico:'i-send',  cls:'ic-brand',label:'30日10投稿 達成率', val:pct(post10,started.length), unit:'%', sub:`${post10} / ${started.length} 名`},
    {ico:'i-send',  cls:'ic-gray', label:'50日30投稿 達成率', val:pct(post30,started.length), unit:'%', sub:`${post30} / ${started.length} 名`},
  ];
  const order = [
    {k:'stagnant', m:'danger'},{k:'stuck', m:'warn'},{k:'inprog', m:'info'},
    {k:'ok50', m:'ok'},{k:'over80', m:'info'},{k:'grad', m:'ok'},{k:'no_sp', m:'idle'},
  ];
  const markerCol = {danger:'var(--danger)',warn:'var(--warn)',info:'var(--brand)',ok:'var(--ok)',idle:'var(--faint)'};

  $('#page-progress').innerHTML = `
    <div class="page-head">
      <div><div class="page-title">進捗キャッチアップ</div><div class="page-sub">${scopeLabel()} ／ 状況別の生徒詳細</div></div>
      <div class="page-actions">
        <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('#page-progress .acc').forEach(d => d.open=true)">すべて開く</button>
        <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('#page-progress .acc').forEach(d => d.open=false)">すべて閉じる</button>
      </div>
    </div>
    <div class="stack">
      <div class="grid g4">${kpis.map(k => `
        <div class="kpi" style="cursor:default">
          <div class="kpi-top"><span class="kpi-ico ${k.cls}"><svg class="ic"><use href="#${k.ico}"/></svg></span><span class="kpi-label">${k.label}</span></div>
          <div class="kpi-val">${k.val}<span class="u">${k.unit}</span></div><div class="kpi-sub">${k.sub}</div>
        </div>`).join('')}</div>

      <div class="card card-pad" style="padding:15px 22px">
        <div class="legend">
          <span style="font-weight:700;color:var(--muted);font-size:12px">投稿プログラム凡例</span>
          <span class="li"><span class="sq sp-done"></span> SP完了</span><span class="li"><span class="sq sp-todo"></span> SP未完</span>
          <span class="li"><span class="sq ap-done"></span> AP完了</span><span class="li"><span class="sq ap-todo"></span> AP未完</span>
          <span class="li"><span class="sq pp-done"></span> PP完了</span><span class="li"><span class="sq pp-todo"></span> PP未完</span>
        </div>
      </div>

      <div>
        ${order.map(o => {
          const items = list.filter(s => s.status===o.k);
          if (!items.length) return '';
          const open = ['stagnant','stuck'].includes(o.k);
          return `<details class="acc" ${open?'open':''}>
            <summary>
              <svg class="ic chev"><use href="#i-chevron-right"/></svg>
              <span class="acc-marker" style="background:${markerCol[o.m]}"></span>
              <span class="t">${STATUS[o.k].label}</span>
              <span class="badge ${STATUS[o.k].badge}">${items.length}名</span>
              <span class="count">投稿 平均 ${items.length ? Math.round(items.reduce((a,s) => a+s.posts, 0)/items.length) : 0}件</span>
            </summary>
            <div class="acc-body">
              ${items.map(s => `<div class="sline" onclick="openStudent('${s.id}')">
                <span class="sline-name">${s.name}</span>
                <span class="sline-meta" style="min-width:120px">${s.cls}・${s.teacher}</span>
                <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px">
                  ${stepRow('SP',s.sp,'sp')}${stepRow('AP',s.ap,'ap')}${stepRow('PP',s.pp,'pp')}
                </div>
                <div style="text-align:right;min-width:70px"><div style="font-size:15px;font-weight:700;font-variant-numeric:tabular-nums">${s.posts}</div><div style="font-size:10.5px;color:var(--faint)">投稿数</div></div>
                <div style="text-align:right;min-width:56px"><div style="font-size:13px;font-weight:600">${s.grad?'—':s.days+'日'}</div><div style="font-size:10.5px;color:var(--faint)">開始から</div></div>
              </div>`).join('')}
            </div></details>`;
        }).join('')}
      </div>
    </div>`;
}
function stepRow(label, done, cls) {
  let sq = '';
  for (let i = 0; i < 10; i++) sq += `<span class="sq ${cls}-${i<done?'done':'todo'}"></span>`;
  return `<div class="steps-row"><span class="steps-label">${label}</span><div class="steps">${sq}</div></div>`;
}

/* ═════════════ STUDENT MODAL ═════════════ */

  const r = s.__row;
  const expGrad = expectedGradDate(r);
  const expStr = expGrad ? fmt(expGrad) : '—';
  const gradActual = gradDateOf(r) || '—';
  $('#smBody').innerHTML = `
    <div class="dm-profile">
      <span class="dm-av">${ini(s.name)}</span>
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700">${s.name}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:7px;flex-wrap:wrap">
          ${statusBadge(s.status)}<span class="badge badge-line">${CURR[s.curr]||s.curr}カリキュラム</span><span class="muted" style="font-size:13px">${s.cls}・${s.teacher}</span>
        </div>
      </div>
    </div>
    <div class="dm-info">

      <div><div class="k">最終ステップ</div><div class="v">${s.step}</div></div>
      <div><div class="k">1万アカ達成</div><div class="v">${s.man10?'達成':'未達'}</div></div>
      <div><div class="k">卒業日</div><div class="v">${gradActual}</div></div>
      <div><div class="k">卒業予定日</div><div class="v">${expStr}</div></div>
      <div><div class="k">初回HR日</div><div class="v">${r.grad?.firstHR || '—'}</div></div>

    <div class="dm-stats" style="margin-bottom:20px">

/* ═════════════ CLASS MODAL (12回タイムライン) ═════════════ */
function openClass(clsName){
  const list = viewStudents();
  const cl = list.filter(s => s.cls === clsName);
  if (!cl.length) return;
  const teacher = cl[0]?.teacher || '';
  const lecData = classLecturesMap.get(classKey(clsName));
  const lectures = lecData ? lecData.lectures : [];
  const heldCount = lectures.filter(l => l.held).length;
  const nextIdx = heldCount;   // next lecture is heldCount-th (0-indexed)
  const need = cl.filter(s => s.status==='stagnant'||s.status==='stuck').length;
  const ok = cl.filter(s => ['ok50','over80','grad'].includes(s.status)).length;
  const grad = cl.filter(s => s.grad).length;

  $('#cmTitle').textContent = clsName;
  $('#cmBody').innerHTML = `
    <div class="dm-profile">
      <span class="dm-av" style="background:var(--brand)">${heldCount}</span>
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700">${clsName}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:7px;flex-wrap:wrap">
          <span class="muted" style="font-size:13px">${teacher} ／ 第${heldCount||'?'}回まで実施 / 全12回</span>
          ${need ? `<span class="badge badge-danger">要対応 ${need}</span>` : `<span class="badge badge-line">順調</span>`}
        </div>
      </div>
    </div>
    <div class="dm-stats" style="margin-bottom:20px">
      <div class="dm-stat"><div class="v">${cl.length}</div><div class="l">生徒数</div></div>
      <div class="dm-stat"><div class="v" style="color:var(--ok)">${ok}</div><div class="l">達成</div></div>
      <div class="dm-stat"><div class="v">${grad}</div><div class="l">卒業</div></div>
    </div>

    <div class="card-title" style="font-size:14px;margin-bottom:12px"><svg class="ic"><use href="#i-calendar"/></svg> 全12回カリキュラム</div>
    ${!lectures.length ? `<div class="empty" style="padding:24px 0">講師の生徒管理シートを読み込み中…（${CURRENT_TEACHER ? '該当クラスのデータがありません' : '講師フィルタを選択するとここに表示されます'}）</div>` : ''}
    <div class="lec-tl">
      ${CURRICULUM.map((cu, i) => {
        const lec = lectures[i] || {};
        const d = parseDate(lec.date);
        const isDone = !!d && d < TODAY;
        const isToday = !!d && daysBetween(TODAY, d) === 0;
        const isNext = !isDone && !isToday && i === nextIdx;
        const cls = isDone ? 'done' : isToday ? 'next' : isNext ? 'next' : 'future';
        const dateStr = d ? `${d.getMonth()+1}/${d.getDate()}（${dow(d)}）` : '未定';
        const typeBadge = `<span class="badge badge-line" style="font-size:11px">${cu.type}</span>`;
        const stateBadge = isDone ? `<span class="badge badge-ok" style="font-size:11px">実施済</span>`
                        : isToday ? `<span class="badge badge-red" style="font-size:11px">本日</span>`
                        : isNext  ? `<span class="badge badge-red" style="font-size:11px">次回</span>`
                        : '';
        return `<div class="lec-tl-item ${cls}">
          <div class="lec-tl-no"><span class="num">${cu.no}</span><span class="lbl">回</span></div>
          <div class="lec-tl-body">
            <div class="lec-tl-title">${cu.title} ${typeBadge} ${stateBadge}</div>
            <div class="lec-tl-goal">${cu.goal}</div>
          </div>
          <div class="lec-tl-date">${dateStr}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="card-title" style="font-size:14px;margin:24px 0 12px"><svg class="ic"><use href="#i-users"/></svg> 在籍生徒 (${cl.length}名)</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>名前</th><th>ステータス</th><th>進捗</th><th>開始から</th><th>最終ステップ</th></tr></thead>
      <tbody>
        ${cl.map(s => { const urgent=s.status==='stagnant';
          return `<tr class="clickable ${urgent?'flag':''}" onclick="closeModal('classModal');setTimeout(()=>openStudent('${s.id}'),50)">
            <td class="name">${s.name}</td>
            <td>${statusBadge(s.status)}</td>
            <td><div class="bar-row"><div class="bar ${barClass(s.status)}"><i style="width:${s.prog}%"></i></div><span class="bar-lbl">${s.prog}%</span></div></td>
            <td class="num nowrap">${s.grad?'—':s.days+'日'}</td>
            <td class="nowrap">${s.step}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  `;
  openModal('classModal');
}

/* ═════════════ Boot ═════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') $$('.overlay.open').forEach(o => o.classList.remove('open'));
});
const _gs = $('#globalSearch');
if (_gs) _gs.addEventListener('input', e => {
  state.search = e.target.value;
  if (state.page !== 'search') go('search');
  else renderSearch();
  const sb = $('#searchBox'); if (sb && sb !== e.target) sb.value = e.target.value;
});

// 初期描画
go('dashboard');
if (CFG.webAppUrl && CFG.token) loadData();
else $('#page-dashboard').innerHTML = `
  <div class="page-head"><div><div class="page-title">講師ポータル</div><div class="page-sub">データ受付窓口の設定が必要です</div></div></div>
  <div class="card card-pad" style="text-align:center;padding:48px 26px">
    <svg class="ic ic-l" style="width:48px;height:48px;color:var(--brand);margin-bottom:14px"><use href="#i-settings"/></svg>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">初期設定</div>
    <p style="color:var(--muted);font-size:13.5px;line-height:1.7;margin-bottom:18px">
      右上の<b style="color:var(--ink)">「設定」</b>ボタンから、GAS Web App の URL とアクセストークンを入力してください。<br>
      （URL・トークンはブラウザに保存され、次回以降は自動で読み込まれます）
    </p>
    <button class="btn btn-primary" onclick="openSettings()">設定を開く</button>
  </div>`;
</script>
</body>
</html>
