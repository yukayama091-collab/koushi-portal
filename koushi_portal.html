function tmField(label,val,opts){
  opts=opts||{};
  const req = opts.req?'<span class="req">必須</span>':'';
  if(opts.link!==undefined){
    return `<div class="field"><label>${label}</label>${opts.link?`<div class="linkfield"><a href="${tmEsc(opts.linkurl||'#')}" target="_blank">${tmIcon('ext',14)} ${tmEsc(opts.linktext||'リンクを開く')}</a></div>`:`<div class="linkfield empty">未設定</div>`}</div>`;
  }
  if(opts.sel){
    const options = opts.options || [val||'—'];
    return `<div class="field"><label>${label}${req}</label><select>${options.map(o=>`<option ${o===val?'selected':''}>${tmEsc(o)}</option>`).join('')}</select></div>`;
  }
  if(opts.area) return `<div class="field"><label>${label}</label><textarea>${tmEsc(val)}</textarea></div>`;
  return `<div class="field"><label>${label}${req}</label><input value="${tmEsc(val)}" ${opts.ro?'readonly':''}></div>`;
}

function tmTabContent(r, t){
  if(t===0) return `
    <div class="field-row">${tmField("講師名（表示名）",r.name,{req:true})}${tmField("本名",r.real||"")}</div>
    ${tmField("アカウント名",r.account,{area:true})}
    <div class="field"><label>アカウントリンク</label>${r.ig?`<div class="linkfield"><a href="${tmEsc(r.ig)}" target="_blank">${tmIcon('ext',14)} ${tmEsc(r.ig)}</a></div>`:'<div class="linkfield empty">未設定</div>'}</div>
    <div class="field-row three">${tmField("性別",r.gender,{sel:true,options:["","男性","女性"]})}${tmField("生年月日",r.birth)}${tmField("講師ID",r.id,{ro:true})}</div>
    <div class="field-row three">${tmField("ジャンル",r.genre,{sel:true,req:true,options:["","暮らし","レシピ","ダイエット","スポット","Excel","美容","育児・教育","お金","ガジェット","エンタメ","筋トレ","健康"]})}
      ${tmField("ランク",r.rank,{sel:true,req:true,options:["マスター","ダイヤモンド","プラチナ","ゴールド","シルバー","特別条件"]})}
      ${tmField("通常 / 専属",r.type,{sel:true,options:["通常","専属"]})}</div>`;
  if(t===1) return `
    <div class="field-row">${tmField("契約日",r.contract)}${tmField("契約終了日","")}</div>
    <div class="field-row">${tmField("稼働状況",r.active,{sel:true,req:true,options:["稼働中","未稼働"]})}${tmField("退職",r.retire?"退職済":"—",{sel:true,options:["—","退職済"]})}</div>
    <div class="sec-label">メモ</div>${tmField("契約に関する備考","",{area:true})}`;
  if(t===2) return `
    <div class="field-row three">
      ${tmField("1on1対応可否",r.one?"可":"不可",{sel:true,options:["可","不可"]})}
      <div class="field"><label>卒業クラス</label><div class="linkfield" style="border:none;background:none;padding:0">${tmClsChips(r.grad,"")}</div></div>
      <div class="field"><label>進行クラス</label><div class="linkfield" style="border:none;background:none;padding:0">${tmClsChips("",r.ongoing)}</div></div>
    </div>
    ${tmField("生徒管理シート","",{link:r.id!=="0001",linktext:"生徒管理シートを開く"})}
    ${tmField("講師紹介シート","",{link:r.id!=="0001",linktext:"講師紹介シートを開く"})}
    ${tmField("紹介画像（Canva）","",{link:true,linktext:"デザインを開く"})}`;
  if(t===3) return `
    <div class="field-row">${tmField("講師MG",r.mg,{sel:true,options:["こうし","こうき","うちこ","しゅうへい","かりん","未定","担当なし"]})}${tmField("サポMG",r.sup,{sel:true,options:["kenta","ゆん","おはな","次回ローンチ時","未定","担当なし"]})}</div>
    <div class="field-row three">${tmField("受け持ちクラス数",r.classes+" クラス")}${tmField("1クラスの人数",r.perClass+" 名")}${tmField("当月ローンチ時期",r.launch)}</div>
    ${tmField("受け持ち可能な時間帯",r.slot)}
    <div class="field-row">${tmField("得意ジャンル",r.good)}${tmField("苦手ジャンル",r.bad)}</div>`;
  if(t===4){
    const rows = TM_STUDENTS[r.id];
    if(!rows) return `<div style="font-size:13px;color:var(--muted);padding:8px 2px;line-height:1.7">担当生徒は<b>生徒マスタ</b>と連携して表示されます。<br>現在 <b class="num">${r.students}</b> 名が紐づいています（このデモでは magu のみ実データを表示）。</div>`;
    return `<div class="substu"><table><thead><tr><th>生徒名</th><th>コース</th><th>進捗</th><th>投稿</th><th>担当MG</th></tr></thead><tbody>
      ${rows.map(s=>`<tr><td style="font-weight:600;color:var(--ink)">${tmEsc(s.name)}</td>
        <td><span class="tag">${tmEsc(s.course)}</span></td>
        <td>${s.prog.includes('完了')?`<span class="tmbadge tmbadge-ok">${tmEsc(s.prog)}</span>`:`<span class="tmbadge tmbadge-line">${tmEsc(s.prog)}</span>`}</td>
        <td class="num">${s.posts}</td><td>${tmEsc(s.mg)}</td></tr>`).join('')}
      </tbody></table><div class="add">${tmIcon('plus',14)} 生徒を追加</div></div>`;
  }
}

function tmRenderDrawerBody(){
  document.getElementById('tm-dr-body').innerHTML = tmTabContent(tmCurRec, tmCurTab);
  document.querySelectorAll('#tmDrawer .dr-tab').forEach((b,i)=>b.classList.toggle('on', i===tmCurTab));
}

function openTeacherDrawer(id, isNew){
  tmCurTab = 0;
  const r = isNew ? {id:"（自動採番）",name:"",account:"",real:"",genre:"",rank:"シルバー",type:"通常",gender:"",birth:"",contract:"",active:"未稼働",one:false,grad:"",ongoing:"",mg:"未定",sup:"未定",classes:0,perClass:0,slot:"",good:"",bad:"",launch:"",students:0,ig:"",retire:false} : TM_DATA.find(t=>t.id===id);
  if(!r) return;
  tmCurRec = r;
  const drawer = document.getElementById('tmDrawer');
  drawer.innerHTML = `
    <div class="dr-head">
      <span class="dr-av">${tmEsc(isNew?'＋':tmInitials(r.name))}</span>
      <div style="min-width:0;flex:1">
        <h2>${isNew?'新規講師の登録':tmEsc(r.name)}${isNew?'':`<span class="hd">${r.id}</span>`}</h2>
        <div class="dr-meta">${isNew?'<span class="tmbadge tmbadge-line">下書き</span>':`${tmRankBadge(r.rank)} ${tmTypeBadge(r.type)} ${tmActiveBadge(r.active)}`}</div>
      </div>
      ${isNew?'':`<button class="btn btn-primary btn-sm" id="tm-dr-portal" title="この講師のダッシュボード/担当生徒/講義実施状況などをポータルで見る" style="margin-right:8px;height:34px;padding:0 12px;display:inline-flex;align-items:center;gap:6px">${tmIcon('ext',14)} ポータルで見る</button>`}
      <button class="dr-x" id="tm-dr-close">${tmIcon('x',18)}</button>
    </div>
    <div class="dr-tabs">${TM_TABS.map((t,ti)=>`<button class="dr-tab ${ti===0?'on':''}">${t}${ti===4?`<span class="cnt">${r.students}</span>`:''}</button>`).join('')}</div>
    <div class="dr-body" id="tm-dr-body"></div>
    <div class="dr-foot">
      <button class="btn btn-primary">保存する</button>
      <button class="btn btn-ghost" id="tm-dr-cancel">キャンセル</button>
      ${isNew?'':`<span class="hist">最終更新: — ／ 変更履歴</span>`}
    </div>`;
  drawer.querySelectorAll('.dr-tab').forEach((b,ti)=>b.onclick=()=>{tmCurTab=ti; tmRenderDrawerBody();});
  document.getElementById('tm-dr-close').onclick = closeTeacherDrawer;
  document.getElementById('tm-dr-cancel').onclick = closeTeacherDrawer;
  const tmPortalBtn = document.getElementById('tm-dr-portal');
  if (tmPortalBtn) tmPortalBtn.onclick = () => {
    closeTeacherDrawer();
    if (typeof selectTeacher === 'function') {
      try { selectTeacher(r.id); } catch(e) { console.error('selectTeacher failed', e); }
    }
  };
  tmRenderDrawerBody();
  document.getElementById('tmScrim').classList.add('open');
  drawer.classList.add('open');
}

function closeTeacherDrawer(){
  document.getElementById('tmDrawer').classList.remove('open');
  document.getElementById('tmScrim').classList.remove('open');
}

function exportTeachersCSV(){
  const rows = tmFiltered();
  const cols = ['id','name','account','ig','real','genre','rank','type','gender','birth','contract','active','one','grad','ongoing','mg','sup','classes','perClass','slot','good','bad','launch','students'];
  const csv = [cols.join(',')].concat(rows.map(r=>cols.map(c=>{
    const v = r[c]==null?'':String(r[c]).replace(/"/g,'""');
    return /[",\n]/.test(v) ? `"${v}"` : v;
  }).join(','))).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `講師マスタ_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// scrim クリック / Esc で閉じる
document.addEventListener('click', e=>{ if(e.target.id==='tmScrim') closeTeacherDrawer(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeTeacherDrawer(); });
</script>
